<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <!-- Mobil Zoom Kapatma ve Tam Ekran Ayarı -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AI YUSUF</title>

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --bg-color: #030712;
            --glass-bg: rgba(31, 41, 55, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            height: 100dvh;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        .chat-container {
            width: 100%;
            max-width: 500px; /* Mobil odaklı ama desktopta da şık */
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Header Tasarımı */
        .header {
            padding: 20px;
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            text-align: center;
            z-index: 10;
        }

        .header h1 {
            font-size: 1.2rem;
            color: #fff;
            letter-spacing: 1px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        /* Mesaj Alanı */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 100px; /* Giriş alanı için boşluk */
        }

        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.5;
            position: relative;
            animation: slideUp 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .user {
            align-self: flex-end;
            background: var(--primary-gradient);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .bot {
            align-self: flex-start;
            background: var(--glass-bg);
            backdrop-filter: blur(5px);
            color: #e5e7eb;
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }

        /* Giriş Alanı */
        .input-area-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(transparent, var(--bg-color) 30%);
        }

        .input-wrapper {
            display: flex;
            background: rgba(31, 41, 55, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 8px 8px 8px 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 16px; /* 16px altı mobilde zoom tetikler, bu yüzden 16px idealdir */
            height: 45px;
        }

        button {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: var(--primary-gradient);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        button:active {
            transform: scale(0.9);
        }

        /* Markdown Kalın Yazı */
        strong {
            color: #a855f7;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <h1>YUSUF AI</h1>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message bot">
            Selam! Sisteme bağlandın. Senin için ne yapabilirim? ⚡
        </div>
    </div>

    <div class="input-area-container">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Bir şeyler sor..." autocomplete="off">
            <button onclick="sendMessage()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>
</div>

<script>
    const API_KEY = "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";

    async function sendMessage() {
        const input = document.getElementById("userInput");
        const text = input.value.trim();
        
        if (!text) return;

        addMessage(text, "user");
        input.value = "";

        const loadingDiv = addMessage("Düşünüyor...", "bot");
        loadingDiv.style.opacity = "0.5";

        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "openai/gpt-4o-mini",
                    messages: [{ role: "user", content: text }]
                })
            });

            const data = await response.json();

            if (data.choices) {
                addMessage(data.choices[0].message.content, "bot");
            } else {
                addMessage("Bir hata oluştu: " + (data.error?.message || "Bilinmiyor"), "bot");
            }
        } catch (err) {
            loadingDiv.remove();
            addMessage("Bağlantı hatası!", "bot");
        }
    }

    function addMessage(text, type) {
        const chatBox = document.getElementById("chatBox");
        const div = document.createElement("div");
        div.className = `message ${type}`;
        
        // Basit formatlama
        let formattedText = text
            .replace(/\n/g, "<br>")
            .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");

        div.innerHTML = formattedText;
        chatBox.appendChild(div);
        
        // Scroll ayarı
        chatBox.scrollTo({
            top: chatBox.scrollHeight,
            behavior: 'smooth'
        });
        
        return div;
    }

    document.getElementById("userInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });
</script>

</body>
</html>
